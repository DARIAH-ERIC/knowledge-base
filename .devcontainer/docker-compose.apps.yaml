services:
  app:
    image: ghcr.io/acdh-oeaw/devcontainer-frontend:24
    container_name: dariah-knowledge-base-devcontainer
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default:
    name: dariah-knowledge-base
