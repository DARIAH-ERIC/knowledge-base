services:
  imgproxy:
    image: nginxinc/nginx-unprivileged:stable-alpine
    container_name: dariah-knowledge-base-imgproxy
    restart: unless-stopped
    depends_on:
      imgproxy-origin:
        condition: service_started
    ports:
      - "${IMGPROXY_PORT:-8080}:8080"
    volumes:
      - ./nginx/imgproxy.conf:/etc/nginx/conf.d/default.conf:ro
      - imgproxy-cache:/var/cache/nginx
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--output-document=/dev/null",
          "http://127.0.0.1:8080/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  imgproxy-origin:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: dariah-knowledge-base-imgproxy-origin
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # IMGPROXY_MALLOC: jemalloc
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_USE_S3: true
      IMGPROXY_ALLOWED_SOURCES: s3://
      IMGPROXY_S3_ENDPOINT: http://minio:${S3_PORT:-9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_EC2_METADATA_DISABLED: true

volumes:
  imgproxy-cache:
    name: dariah-knowledge-base-imgproxy-cache

networks:
  default:
    name: dariah-knowledge-base
